name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    if: |
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'OWNER' ||
      github.event.pull_request.author_association == 'COLLABORATOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Revise o PR ${{ github.repository }}/pull/${{ github.event.pull_request.number }}.
            Analise segurança, bugs, queries N+1 e qualidade geral.
            Retorne JSON com: has_critical_issues (boolean), risk_level (low/medium/high), summary (string).
          use_sticky_comment: 'true'
          claude_args: |
            --max-turns 15
            --system-prompt "Revisor sênior Python/Django. Revise em português."
            --json-schema .github/claude-review-schema.json

      - name: Bloqueia merge se crítico
        if: fromJSON(steps.claude-review.outputs.structured_output).has_critical_issues == true
        run: |
          echo "❌ Risk level: ${{ fromJSON(steps.claude-review.outputs.structured_output).risk_level }} — merge bloqueado"
          exit 1